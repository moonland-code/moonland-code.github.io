<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Changer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen">
    <h1 class="text-blue-400 font-bold text-center text-3xl py-4"> 
        <a href="./index.html ">moonland-code</a>
    </h1>
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold text-white">DNS Changer</h1>
        </header>
        <div class="max-w-xl mx-auto bg-gray-900 rounded-xl shadow-lg p-6 mb-12">
            <div class="flex flex-col items-center">
                <div class="grid grid-cols-3 gap-8 w-full mb-8">
                    <div class="flex flex-col items-center p-4 bg-gray-800 rounded-xl hover:bg-gray-700 transition-colors cursor-pointer">
                        <img src="https://cdn-icons-png.flaticon.com/512/25/25412.png" alt="Windows" class="w-16 h-16 mb-3">
                        <span class="text-white text-sm">Windows</span>
                    </div>
                    <div class="flex flex-col items-center p-4 bg-gray-800 rounded-xl hover:bg-gray-700 transition-colors cursor-pointer">
                        <img src="https://cdn-icons-png.flaticon.com/512/2/2235.png" alt="Mac" class="w-16 h-16 mb-3">
                        <span class="text-white text-sm">MacOS</span>
                    </div>
                    <div class="flex flex-col items-center p-4 bg-gray-800 rounded-xl hover:bg-gray-700 transition-colors cursor-pointer">
                        <img src="https://www.pngplay.com/wp-content/uploads/13/Linux-Logo-Free-PNG.png" alt="Linux" class="w-16 h-16 mb-3">
                        <span class="text-white text-sm">Linux</span>
                    </div>
                </div>
                
                <div class="w-full space-y-4">
                    <div class="flex items-center space-x-4">
                        <span class="text-white w-24">version:</span>
                        <div class="flex-1 bg-gray-800 text-white rounded px-4 py-2">1.0.0</div>
                        <span class="bg-green-500/20 text-green-500 px-3 py-1 rounded-full text-sm">Latest Version</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-white w-24">size:</span>
                        <div class="flex-1 bg-gray-800 text-white rounded px-4 py-2">15.2 MB</div>
                        <button class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm hover:bg-blue-600">Download</button>
                    </div>
                </div>
            </div>
        </div>


        </div>
    </div>
</body>
</html>
